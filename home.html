  <main>
    <div class="home-banner">
      <div class="banner-text">
        <h2>丝路咽喉，千年佛宫</h2>
        <p>敦煌，丝绸之路上的璀璨明珠，承载着东西方文明交融的千年记忆</p>
      </div>
    </div>

    <section class="home-section">
      <h2>敦煌概览</h2>
      <p>敦煌位于河西走廊最西端，是古丝绸之路的重镇。自汉代设郡以来，敦煌便是中原与西域经济文化交流的枢纽，莫高窟、月牙泉、玉门关、阳关共同构成了敦煌的文化地标。</p>
    </section>

    <section class="home-section">
      <h2>敦煌瑰宝</h2>
      <div class="card-group">
        <div class="card">
          <div class="card-img" style="background-image: url('images/2.jpg');"></div>
          <div class="card-text">
            <h3>莫高窟</h3>
            <p>世界现存规模最大的佛教艺术宝库，历经十六国至元十余个朝代开凿</p>
          </div>
        </div>
        <div class="card">
          <div class="card-img" style="background-image: url('images/3.jpg');"></div>
          <div class="card-text">
            <h3>月牙泉</h3>
            <p>沙漠第一泉，千年不涸，沙水共生，是敦煌自然景观的代表</p>
          </div>
        </div>
        <div class="card">
          <div class="card-img" style="background-image: url('images/4.jpg');"></div>
          <div class="card-text">
            <h3>玉门关</h3>
            <p>汉代重要关隘，丝绸之路上的西大门，见证了丝路的繁华与沧桑</p>
          </div>
        </div>
      </div>
    </section>
